<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="This page about a business card use CSS selectors like type, and class selectors and CSS properties like margin, padding, max-width, text-align, font-family etc." />
    <meta property="og:title" content="compercafe.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"/>
    <meta property="og:url" content="https://www.freecodecamp.org" />
    <title>Business Card</title>
    <link href="styles/BusinessCard.css" rel="stylesheet"/>
</head>
<body>
    <div class="business-card">
        <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="A beautiful pink flower with a red core on top of it" />
        <p class="full-name">Abdaltwab Okasha Elshiekh</p>
        <p class="designation">Abdaltwab Sayed</p>
        <p class="company">Fayoum University</p>
        <hr>
        <p>Email: your-email@example.com</p>
        <p>Phone: (123) 456-7890</p>
        <a class="portfolio-link" href="https://github.com/">Portfolio</a>
        <hr>
        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="https://x.com/" target="_blank">Twitter</a>
            <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
            <a href="https://github.com/" target="_blank">GitHub</a>
        </div>

    </div>
</body>
</html>
